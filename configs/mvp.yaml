# MVP config — US equities, daily/weekly bars, no LLM.

universe: configs/universe_us_top50.yaml

data:
  source: yahoo
  start: "2018-01-01"
  end: null            # null => today
  bar: "1d"            # 1d, 1wk
  cache_dir: ./data

model:
  use_kronos: true
  kronos_size: mini    # mini | small | base
  lookback: 256        # past bars fed to Kronos
  horizon: 5           # bars to forecast forward
  device: cpu          # cpu | cuda | mps
  cache_forecasts: true

strategy:
  rule: kronos_trend            # kronos_trend | sma_crossover
  params:
    forecast_threshold: 0.005   # require >= 0.5% predicted up-move to enter
    smoothing: 3                # ensemble window for forecast
  fallback_rule: sma_crossover
  fallback_params:
    fast: 20
    slow: 50

sizing:
  method: fixed_fraction         # fixed_fraction | vol_target | kelly
  fraction: 0.05                 # 5% of equity per position
  max_positions: 10

risk:
  max_drawdown_pct: 0.20         # circuit-break beyond -20%
  max_position_pct: 0.15
  max_sector_pct: 0.40           # placeholder — sector data not in MVP
  initial_cash: 100000

backtest:
  fees_bps: 5                    # 5 basis points per side
  slippage_bps: 5
  cash: 100000
  freq: "1d"
  benchmark: SPY
  output_dir: ./data/backtest_reports
