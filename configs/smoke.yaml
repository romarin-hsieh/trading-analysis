# Tiny smoke-test config — 5 tickers + SPY benchmark, ~1.5-year window.
# Used for end-to-end verification of minervini_trend + the market-regime gate.

universe:
  name: smoke
  description: 5-ticker smoke test (+ SPY for benchmark & regime gate)
  symbols: [AAPL, MSFT, GOOGL, NVDA, JPM, SPY]

data:
  source: yahoo
  start: "2023-01-01"
  end: "2024-06-30"
  bar: "1d"
  cache_dir: ./data

model:
  use_kronos: false       # smoke test uses naive forecaster only
  kronos_size: mini
  lookback: 60
  horizon: 5
  device: cpu

strategy:
  rule: minervini_trend
  params:
    min_rs: 70
  fallback_rule: sma_crossover
  fallback_params:
    fast: 20
    slow: 50
  regime_gate: true       # gate longs by SPY 200-SMA regime (CAN SLIM "M")
  regime_window: 200

sizing:
  method: fixed_fraction
  fraction: 0.10
  max_positions: 5

risk:
  max_drawdown_pct: 0.30
  max_position_pct: 0.20
  max_sector_pct: 0.50
  initial_cash: 100000

backtest:
  fees_bps: 5
  slippage_bps: 5
  cash: 100000
  freq: "1d"
  benchmark: SPY
  output_dir: ./data/backtest_reports
