name: daily-monitor
# Multi-dimensional exit votes + Serenity tracker -> Telegram, after US close (weekdays).
# Setup: repo Settings -> Secrets and variables -> Actions:
#   secrets:  TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   variable: PORTFOLIO   e.g. "QQQ,TQQQ,NVDA,PLTR"

on:
  schedule:
    - cron: "40 21 * * 1-5"   # 21:40 UTC = ~after US close (05:40 TW next day)
  workflow_dispatch: {}

permissions:
  contents: write   # serenity tracker persists its seen-state file

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance pandas requests
      - name: exit votes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO: ${{ vars.PORTFOLIO }}
        run: python scripts/notify/exit_monitor.py
      - name: serenity tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify/serenity_tracker.py
      - name: options chain snapshot (SPY/QQQ, time-sensitive data collection)
        run: python scripts/collect/options_snapshot.py || true
      - name: persist tracker state + snapshots
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add -f data/_serenity_seen.txt || true
          git add collected/options || true
          git diff --cached --quiet || git commit -m "chore: tracker state + options snapshot [skip ci]"
          git push || true
