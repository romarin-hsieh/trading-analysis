name: weekly-collect
# Collect-forward pipelines that only need weekly cadence (docs/24 action #4):
# analyst estimate snapshots (eps_trend/eps_revisions/estimates/targets/recommendations)
# for the S&P 500 universe. ~15-25 min, ~200-400 KB/week committed.

on:
  schedule:
    - cron: "0 13 * * 6"   # Sat 13:00 UTC = after Friday US close (21:00 TW)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance pandas requests curl_cffi
      - name: analyst estimate snapshot (S&P 500, time-sensitive collect-forward)
        run: python scripts/collect/analyst_snapshot.py || true
      - name: paper scout (arXiv q-fin + NBER, docs/21 stage 0)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify/paper_scout.py 7 || true
      - name: 8-K event stream (EDGAR daily indexes, docs/24 action 8)
        run: python scripts/collect/events_8k.py || true
      - name: GDELT tone/volume snapshot (DOC API only, never BigQuery)
        run: python scripts/collect/gdelt_news.py 7 || true
      - name: persist snapshots + scout state
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add collected/analyst collected/events8k collected/gdelt || true
          git add -f data/_papers_seen.txt || true
          git diff --cached --quiet || git commit -m "chore: weekly snapshots (analyst + 8-K + GDELT) + paper scout [skip ci]"
          git push || true
